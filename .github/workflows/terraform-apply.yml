name: Terraform Apply

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

jobs:
  terraform-apply:
    runs-on: ubuntu-latest
    environment:
      name: production

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (platform state)
        run: |
          terraform init -reconfigure \
            -backend-config="resource_group_name=rg-platform-state" \
            -backend-config="storage_account_name=sttfstatejoseph001" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=platform.tfstate"

      - name: "Debug: Show backend + state contents"
        run: |
          terraform version
          terraform providers
          terraform state list

      - name: Terraform Apply (bootstrap disabled)
        run: terraform apply -auto-approve -var="enable_bootstrap=false"
